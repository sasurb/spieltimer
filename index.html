<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f1e">
<title>Spieltimer P2P</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  html, body {
    height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f1e; color: #fff;
  }
  body {
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1e 50%, #050510 100%);
    height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 12px);
  }

  .screen {
    display: none;
    flex-direction: column;
    height: 100%;
    gap: 10px;
  }
  .screen.active { display: flex; }

  .btn-exit-top {
    position: absolute; top: env(safe-area-inset-top, 12px); right: 16px; 
    height: 32px; padding: 0 16px; border: 1px solid rgba(255,255,255,0.15); 
    background: rgba(255,255,255,0.05); border-radius: 16px; color: #f87171; 
    font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .btn-exit-top:active { transform: scale(0.95); }

  .title {
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; text-align: center;
    background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 4px;
  }
  .subtitle {
    font-size: 11px; color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 2px;
    text-align: center;
  }

  input[type="text"] {
    width: 100%; padding: 16px 18px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px; color: #fff; font-family: inherit;
    font-size: 17px; outline: none; text-align: center;
    letter-spacing: 1px; -webkit-user-select: text; user-select: text;
    -webkit-appearance: none; appearance: none;
  }
  input[type="text"]:focus { border-color: rgba(167,139,250,0.6); background: rgba(255,255,255,0.09); }
  input[type="text"]#codeInput { text-transform: uppercase; font-weight: 600; letter-spacing: 6px; font-size: 22px; }

  .btn-primary, .btn-secondary, .btn-next, .btn-ghost {
    width: 100%; border: none; border-radius: 16px;
    font-family: inherit; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
    color: #fff; -webkit-appearance: none; appearance: none;
    touch-action: manipulation;
  }
  .btn-primary { padding: 18px; font-size: 15px; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); box-shadow: 0 6px 24px rgba(167, 139, 250, 0.45); }
  .btn-secondary { padding: 18px; font-size: 15px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); }
  .btn-ghost { padding: 12px; font-size: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
  .btn-primary:active, .btn-secondary:active, .btn-next:active, .btn-ghost:active { transform: scale(0.97); }
  .btn-primary:disabled, .btn-next:disabled { opacity: 0.4; box-shadow: none; cursor: not-allowed; }

  .divider { text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 3px; text-transform: uppercase; margin: 4px 0; }
  #screen-welcome { justify-content: center; gap: 16px; max-width: 420px; margin: 0 auto; width: 100%; }
  
  .room-code-display { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 10px 16px; display: flex; flex-direction: column; align-items: center; }
  .code-row { display: flex; justify-content: center; align-items: center; width: 100%; gap: 10px; }
  .room-code-value { font-size: 24px; font-weight: 800; letter-spacing: 4px; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; padding: 0; margin: 0; }
  
  #qrcodeWrapper { display: none; flex-direction: column; align-items: center; margin-top: 8px; }
  #qrcode { display: flex; justify-content: center; background: #fff; padding: 8px; border-radius: 8px; width: fit-content; margin: 0 auto; }
  #qrcode img { width: 100px; height: 100px; }

  .player-list-header { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .player-list { flex: 1 1 auto; overflow-y: auto; min-height: 60px; display: flex; flex-direction: column; gap: 6px; padding-right: 2px; }
  .player-row { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 8px 10px; gap: 8px; }
  .player-row.me { border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.08); }
  .player-row .num { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7); flex-shrink: 0; }

  .audio-toggle { background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; flex-shrink: 0; }
  
  .reorder-btns { display: flex; gap: 4px; flex-shrink: 0; }
  .reorder-btns button { width: 32px; height: 32px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; touch-action: manipulation; }
  .reorder-btns button:disabled { opacity: 0.25; }
  .reorder-btns button.kick { color: #f87171; font-size: 16px; }

  .slider-container { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 12px; margin-bottom: 4px; }
  .slider-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1.5px; }
  .slider-value { color: #a78bfa; font-weight: 600; font-size: 14px; text-decoration: underline dashed; text-underline-offset: 3px; cursor: pointer; }
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); border-radius: 50%; cursor: pointer; box-shadow: 0 2px 8px rgba(167,139,250,0.5); }

  .inline-add-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 6px; }
  .inline-add-row input[type="text"] { flex: 1; padding: 10px 14px; font-size: 14px; text-align: left; letter-spacing: normal; text-transform: none; border-radius: 10px; }
  .inline-add-row button { flex: 0 0 44px; width: 44px; border: none; border-radius: 10px; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); color: #fff; font-size: 20px; font-weight: 700; cursor: pointer; touch-action: manipulation; }
  .inline-add-row button:active { transform: scale(0.95); }

  .current-banner { text-align: center; padding: 8px 0 4px; }
  .current-banner .lbl { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 4px; }
  .current-banner .player-name-big { font-size: 30px; font-weight: 700; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .timer-area { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .timer-container { position: relative; width: min(65vw, 240px); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
  .progress-ring { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 7; }
  .progress-ring-fill { fill: none; stroke: url(#grad); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.3s linear; filter: drop-shadow(0 0 8px rgba(167,139,250,0.5)); }
  .time-text { font-size: clamp(44px, 12vw, 64px); font-weight: 200; font-variant-numeric: tabular-nums; letter-spacing: -2px; text-shadow: 0 0 24px rgba(167,139,250,0.3); }

  .player-pills { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 0 4px; margin-bottom: 4px; }
  .player-pill { padding: 6px 12px; border-radius: 100px; font-size: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
  .player-pill.current { background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); color: #fff; border-color: transparent; font-weight: 600; }

  .btn-next { flex: 0 0 auto; padding: 32px; font-size: 26px; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); box-shadow: 0 8px 32px rgba(167, 139, 250, 0.45); min-height: 120px; border-radius: 24px; margin-top: 8px; }
  .waiting-banner { flex: 0 0 auto; padding: 32px; text-align: center; background: rgba(255,255,255,0.04); border: 2px dashed rgba(255,255,255,0.12); border-radius: 24px; color: rgba(255,255,255,0.6); font-size: 16px; letter-spacing: 1px; min-height: 120px; display: flex; align-items: center; justify-content: center; margin-top: 8px; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  .time-text.finished { animation: pulse 0.8s ease-in-out infinite; background: linear-gradient(135deg, #f87171 0%, #fbbf24 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  #statusBar { position: fixed; top: env(safe-area-inset-top, 8px); left: 50%; transform: translateX(-50%); background: rgba(220,38,38,0.95); color: #fff; padding: 8px 16px; border-radius: 100px; font-size: 13px; z-index: 100; display: none; max-width: 90vw; text-align: center; }
  #statusBar.show { display: block; }
  #statusBar.info { background: rgba(96,165,250,0.95); }
  #statusBar.success { background: rgba(34,197,94,0.95); }

  #connectionDot { position: fixed; top: env(safe-area-inset-top, 22px); left: 16px; width: 10px; height: 10px; border-radius: 50%; background: #ef4444; z-index: 99; transition: background 0.3s; box-shadow: 0 0 6px currentColor; }
  #connectionDot.connected { background: #22c55e; }
  #connectionDot.connecting { background: #fbbf24; }

  #versionTag { position: fixed; top: env(safe-area-inset-top, 20px); left: 34px; font-size: 10px; letter-spacing: 0.5px; color: rgba(255,255,255,0.3); z-index: 50; }
</style>
</head>
<body>

<div id="statusBar"></div>
<div id="connectionDot" title="Verbindungsstatus"></div>
<div id="versionTag"></div>

<div id="screen-welcome" class="screen active">
  <div class="title">Spieltimer</div>
  <div class="subtitle">Lokales P2P-Spiel</div>
  <div style="height: 12px"></div>
  <input type="text" id="nameInput" placeholder="Dein Name" maxlength="20" autocomplete="off">
  <button class="btn-primary" id="btnCreate" type="button">Raum erstellen</button>
  <div class="divider">oder</div>
  <input type="text" id="codeInput" placeholder="CODE" maxlength="4" autocomplete="off">
  <button class="btn-secondary" id="btnJoin" type="button">Raum beitreten</button>
</div>

<div id="screen-lobby" class="screen">
  <button class="btn-exit-top" id="btnLeaveLobbyTop" type="button" title="Raum verlassen">Exit</button>
  <div class="title" style="margin-top: 14px;">Spieltimer</div>
  
  <div class="room-code-display">
    <div class="code-row">
      <span style="font-size:10px; opacity:0.5; text-transform:uppercase; letter-spacing:1px;">Code:</span>
      <span class="room-code-value" id="lobbyRoomCode">----</span>
      <button class="btn-ghost" id="btnToggleQR" type="button" style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border-color: rgba(255,255,255,0.3);" title="QR-Code anzeigen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      </button>
    </div>
    <div id="qrcodeWrapper">
      <div id="qrcode"></div>
      <div style="font-size:10px; opacity:0.5; margin-top:6px;">Zum Beitreten scannen</div>
    </div>
  </div>
  
  <div class="player-list-header">
    <div style="font-size:11px; opacity:0.5; text-transform:uppercase; letter-spacing:2px;">Spieler</div>
    <button class="btn-ghost" id="btnToggleAddLocal" type="button" style="display:none; padding: 6px 10px; font-size: 10px; width: auto; border-radius: 8px; border-color: rgba(167,139,250,0.4); color: #a78bfa;">+ Offline-Spieler</button>
  </div>
  
  <div id="addLocalPlayerBox" style="display:none;">
    <div class="inline-add-row">
      <input type="text" id="localPlayerInput" placeholder="Name (Offline-Spieler)" maxlength="20" autocomplete="off">
      <button type="button" id="btnAddLocalPlayer">+</button>
    </div>
  </div>

  <div class="player-list" id="playerList"></div>

  <div id="hostControls" style="display:none; margin-top: auto;">
    <div class="slider-container">
      <div class="slider-label">
        <span>Zeit pro Zug</span>
        <span class="slider-value" id="lobbySliderValue" title="Doppelklick zum direkten Eintippen">5:00 min</span>
      </div>
      <input type="range" id="lobbyDurationSlider" min="10" max="600" step="10" value="300">
    </div>
    <button class="btn-primary" id="btnStartGame" type="button">Spiel starten</button>
  </div>

  <div id="joinerWait" style="display:none; margin-top: auto;">
    <div style="text-align:center; padding:18px; color:rgba(255,255,255,0.6);" id="joinerWaitText">Warte auf Spielstart…</div>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="current-banner">
    <div class="lbl">Am Zug</div>
    <div class="player-name-big" id="currentPlayerName">-</div>
  </div>
  <div class="timer-area">
    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#a78bfa"/><stop offset="100%" style="stop-color:#60a5fa"/>
          </linearGradient>
        </defs>
        <circle class="progress-ring-bg" cx="100" cy="100" r="92"/>
        <circle class="progress-ring-fill" cx="100" cy="100" r="92" stroke-dasharray="578.05" stroke-dashoffset="0"/>
      </svg>
      <div class="time-text" id="gameTimeText">05:00</div>
    </div>
  </div>
  <div class="player-pills" id="gamePlayerPills"></div>
  <button class="btn-next" id="btnNext" type="button" style="display:none">Weiter</button>
  <div class="waiting-banner" id="waitingBanner" style="display:none">Warte auf <span id="waitingForName" style="margin-left:5px; font-weight:bold; color:#a78bfa"></span>…</div>
  
  <button class="btn-secondary" id="btnHostNext" type="button" style="display:none; margin-top:8px;">Nächster: ?</button>

  <div style="display: flex; gap: 8px; margin-top: 4px;" id="hostGameButtons">
    <button class="btn-ghost" id="btnHostEndGame" type="button" style="display:none; flex: 1;">Spiel beenden</button>
    <button class="btn-secondary" id="btnHostToLobby" type="button" style="display:none; flex: 2;">Zur Lobby</button>
  </div>
  
  <div style="display: flex; gap: 8px; margin-top: 4px;" id="clientGameButtons">
    <button class="btn-ghost" id="btnLeaveGame" type="button" style="display:none; flex: 1;">Spiel verlassen</button>
  </div>
</div>

<script>
'use strict';

const APP_VERSION = 'P2P-1.4';
const TOPIC_PREFIX = 'spieltimer-p2p';
const CIRCUMFERENCE = 2 * Math.PI * 92;
const STATE_REPUBLISH_MS = 3000;
const WATCHDOG_TIMEOUT_MS = 11000;

const app = {
  myName: '', myPeerId: null, isHost: false, roomCode: null,
  players: [], duration: 300, currentIndex: 0, endTimestamp: null,
  isRunning: false, isFinished: false, gameStarted: false
};

let peer = null;
let hostConnections = []; 
let clientConnToHost = null; 

let timeOffset = 0;
let audioCtx = null;
let speechUnlocked = false;
let alarmTriggered = false;
let halftimeTriggered = false;
let thirtySecTriggered = false;
let lastCountdownSecond = null;
let durationBroadcastTimer = null;
let hostRepublishTimer = null;
let watchdogTimer = null;
let lastMessageAt = Date.now();
let wakeLock = null;
let isInJoinPhase = false;
let joinAckTimer = null;
let isExplicitLeave = false;
let lastSliderTap = 0;

const el = {
  nameInput: document.getElementById('nameInput'),
  codeInput: document.getElementById('codeInput'),
  btnCreate: document.getElementById('btnCreate'),
  btnJoin: document.getElementById('btnJoin'),
  lobbyRoomCode: document.getElementById('lobbyRoomCode'),
  playerList: document.getElementById('playerList'),
  hostControls: document.getElementById('hostControls'),
  joinerWait: document.getElementById('joinerWait'),
  joinerWaitText: document.getElementById('joinerWaitText'),
  localPlayerInput: document.getElementById('localPlayerInput'),
  btnAddLocalPlayer: document.getElementById('btnAddLocalPlayer'),
  lobbyDurationSlider: document.getElementById('lobbyDurationSlider'),
  lobbySliderValue: document.getElementById('lobbySliderValue'),
  btnStartGame: document.getElementById('btnStartGame'),
  btnLeaveLobbyTop: document.getElementById('btnLeaveLobbyTop'),
  currentPlayerName: document.getElementById('currentPlayerName'),
  gameTimeText: document.getElementById('gameTimeText'),
  progressRingFill: document.querySelector('.progress-ring-fill'),
  gamePlayerPills: document.getElementById('gamePlayerPills'),
  btnNext: document.getElementById('btnNext'),
  waitingBanner: document.getElementById('waitingBanner'),
  waitingForName: document.getElementById('waitingForName'),
  btnHostNext: document.getElementById('btnHostNext'),
  btnHostEndGame: document.getElementById('btnHostEndGame'),
  btnHostToLobby: document.getElementById('btnHostToLobby'),
  btnLeaveGame: document.getElementById('btnLeaveGame'),
  statusBar: document.getElementById('statusBar'),
  connectionDot: document.getElementById('connectionDot'),
  qrcode: document.getElementById('qrcode'),
  qrcodeWrapper: document.getElementById('qrcodeWrapper'),
  btnToggleQR: document.getElementById('btnToggleQR'),
  btnToggleAddLocal: document.getElementById('btnToggleAddLocal'),
  addLocalPlayerBox: document.getElementById('addLocalPlayerBox')
};

el.progressRingFill.style.strokeDasharray = CIRCUMFERENCE;
document.getElementById('versionTag').textContent = 'v' + APP_VERSION;

const urlParams = new URLSearchParams(window.location.search);
const urlCode = urlParams.get('code');
if (urlCode && urlCode.length === 4) {
    el.codeInput.value = urlCode.toUpperCase();
}

function setScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function showStatus(text, kind = 'error', durationMs = 4000) {
  el.statusBar.textContent = text;
  let cls = 'show';
  if (kind === 'info') cls += ' info';
  else if (kind === 'success') cls += ' success';
  el.statusBar.className = cls;
  if (durationMs > 0) { setTimeout(() => { if(el.statusBar.textContent === text) el.statusBar.className = ''; }, durationMs); }
}
function hideStatus() { el.statusBar.className = ''; }
function setConnState(state) { el.connectionDot.className = state || ''; }

function formatTime(ms) {
  const s = Math.max(0, Math.ceil(ms / 1000));
  return `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
}
function formatDurationLabel(seconds) {
  const m = Math.floor(seconds / 60); const s = seconds % 60;
  return s === 0 ? `${m}:00 min` : `${m}:${String(s).padStart(2,'0')} min`;
}
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}
function generateClientId() { return Math.random().toString(36).slice(2, 14); }
function getSavedName() { try { return localStorage.getItem('spieltimer.name') || ''; } catch (e) { return ''; } }
function saveName(name) { try { localStorage.setItem('spieltimer.name', name); } catch (e) {} }

function ensureSpeech() {
  if (speechUnlocked || !('speechSynthesis' in window)) return;
  try { const u = new SpeechSynthesisUtterance(''); speechSynthesis.speak(u); speechUnlocked = true; } catch (e) {}
}
function speak(text) {
  try {
    if (!('speechSynthesis' in window)) return false;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE'; u.rate = 1.0; u.volume = 1.0;
    speechSynthesis.speak(u);
    return true;
  } catch (e) { return false; }
}

function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume().catch(() => {}); }
  ensureSpeech();
}

function playTones(freqs, noteDur = 0.2, gap = 0.06) {
  ensureAudio(); if (!audioCtx) return;
  const now = audioCtx.currentTime;
  freqs.forEach((f, i) => {
    const t = now + i * (noteDur + gap);
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = f; osc.type = 'sine';
    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.3, t + 0.01); gain.gain.linearRampToValueAtTime(0, t + noteDur);
    osc.start(t); osc.stop(t + noteDur);
  });
}

function alertHalftime() { vibrate([120]); playTones([523, 659], 0.2, 0.06); speak('Halbzeit'); }
function alertThirtySeconds() { vibrate([150]); playTones([784], 0.22); speak('Noch 30 Sekunden'); }
function alertCountdownTick(secondsLeft) {
  const freq = 420 + (10 - secondsLeft) * 44; 
  vibrate([60]); playTones([freq], 0.12);
  if (secondsLeft === 10) speak('Noch 10 Sekunden');
}
function alertFinished() { playTones([880, 880, 880], 0.3, 0.1); }
function resetTurnAlerts() { alarmTriggered = false; halftimeTriggered = false; thirtySecTriggered = false; lastCountdownSecond = null; }
function vibrate(pattern = [200, 100, 200, 100, 200]) { if (navigator.vibrate) navigator.vibrate(pattern); }

function audioAllowed() {
    const me = app.players.find(p => p.peerId === app.myPeerId);
    return me ? me.audioEnabled : false;
}

async function requestWakeLock() { 
  if (!app.roomCode) return; 
  try { 
    if ('wakeLock' in navigator && !wakeLock) { 
      wakeLock = await navigator.wakeLock.request('screen'); 
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } 
  } catch (e) {} 
}
async function releaseWakeLock() { try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch (e) {} }

document.addEventListener('click', () => { ensureAudio(); requestWakeLock(); });
document.addEventListener('touchend', () => { ensureAudio(); requestWakeLock(); });

function checkAndReconnectIfNeeded() {
  if (!app.roomCode || isExplicitLeave) return;
  requestWakeLock();
  
  if (app.isHost) {
      if (peer && peer.disconnected && !peer.destroyed) {
          setConnState('connecting');
          peer.reconnect();
      }
  } else {
      if (!clientConnToHost || !clientConnToHost.open) {
          showStatus('Verbindung wiederherstellen...', 'info', 2000);
          reconnectClientToHost();
      }
  }
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') checkAndReconnectIfNeeded(); });
window.addEventListener('pageshow', () => { checkAndReconnectIfNeeded(); });
window.addEventListener('online', () => { checkAndReconnectIfNeeded(); });

function startWatchdog() {
  stopWatchdog();
  watchdogTimer = setInterval(() => {
    if (!app.roomCode || isExplicitLeave || app.isHost) return;
    if ((Date.now() - lastMessageAt) > WATCHDOG_TIMEOUT_MS) {
      showStatus('Verbindung scheint eingefroren – Reconnect...', 'info', 2000);
      checkAndReconnectIfNeeded();
    }
  }, 5000);
}
function stopWatchdog() { if (watchdogTimer) { clearInterval(watchdogTimer); watchdogTimer = null; } }

function reconnectClientToHost() {
    if (!app.roomCode || isExplicitLeave || app.isHost) return;
    setConnState('connecting');
    if (clientConnToHost) { clientConnToHost.close(); }
    
    if (!peer || peer.destroyed) {
        initClientPeer(() => establishConnectionToHost(app.roomCode, true));
    } else if (peer.disconnected) {
        peer.reconnect();
        setTimeout(() => establishConnectionToHost(app.roomCode, true), 1000);
    } else {
        establishConnectionToHost(app.roomCode, true);
    }
}

function establishConnectionToHost(code, isReconnect = false) {
    const targetId = `${TOPIC_PREFIX}-${code}`;
    clientConnToHost = peer.connect(targetId, { reliable: true });
    
    clientConnToHost.on('open', () => {
        setConnState('connected');
        lastMessageAt = Date.now();
        startWatchdog();
        publishAction({ type: 'join', name: app.myName });
    });
    
    clientConnToHost.on('data', (data) => {
        lastMessageAt = Date.now();
        if (data.type === 'state') handleStateMessage(data.state);
    });
    
    clientConnToHost.on('close', () => {
        setConnState('');
        stopWatchdog();
        if (!isExplicitLeave && app.roomCode) {
            setTimeout(() => checkAndReconnectIfNeeded(), 2000);
        }
    });
}

function initClientPeer(onReady) {
    if (peer) peer.destroy();
    peer = new Peer({ debug: 0 });
    
    peer.on('open', (id) => {
        app.myPeerId = id;
        if (onReady) onReady();
    });
    
    peer.on('disconnected', () => { setConnState(''); if (!isExplicitLeave) peer.reconnect(); });
    peer.on('error', (err) => { 
        setConnState(''); 
        if(isInJoinPhase) showStatus('Fehler beim Verbinden mit Server.'); 
    });
}

function publishState() {
  if (!app.isHost || isExplicitLeave) return;
  const snapshot = {
    players: app.players, duration: app.duration, currentIndex: app.currentIndex,
    endTimestamp: app.endTimestamp, isRunning: app.isRunning, isFinished: app.isFinished,
    gameStarted: app.gameStarted, hostTime: Date.now()
  };
  hostConnections.forEach(conn => {
      if (conn.open) conn.send({ type: 'state', state: snapshot });
  });
}

function startHostRepublish() { stopHostRepublish(); hostRepublishTimer = setInterval(() => publishState(), STATE_REPUBLISH_MS); }
function stopHostRepublish() { if (hostRepublishTimer) { clearInterval(hostRepublishTimer); hostRepublishTimer = null; } }

function publishAction(action) {
  if (app.isHost) return;
  const payload = { ...action, from: app.myPeerId, ts: Date.now() };
  if (clientConnToHost && clientConnToHost.open) {
      clientConnToHost.send(payload);
  }
}

function handleActionMessage(action) {
  if (!app.isHost) return;
  if (action.type === 'join') {
    if (!action.from || !action.name) return;
    if (app.players.find(p => p.peerId === action.from)) { publishState(); return; }
    if (app.gameStarted) return;
    app.players.push({ peerId: action.from, name: action.name, audioEnabled: false });
    publishState(); renderLobby();
  } else if (action.type === 'next') {
    if (!app.gameStarted) return;
    const cur = app.players[app.currentIndex];
    if (cur && cur.peerId === action.from) { advanceTurn(); }
  } else if (action.type === 'leave') {
    removePlayer(action.from);
  }
}

function removePlayer(peerId) {
  const idx = app.players.findIndex(p => p.peerId === peerId); if (idx < 0) return;
  const wasCurrent = idx === app.currentIndex; app.players.splice(idx, 1);
  if (app.players.length === 0) { hostResetGame(); return; }
  if (app.currentIndex >= app.players.length) { app.currentIndex = 0; }
  if (app.gameStarted && wasCurrent) { app.endTimestamp = Date.now() + app.duration * 1000; app.isRunning = true; app.isFinished = false; resetTurnAlerts(); }
  publishState(); refreshUI();
}

function handleStateMessage(snapshot) {
  if (snapshot.closed) { if (isInJoinPhase) return; showStatus('Der Raum wurde vom Host geschlossen.'); leaveRoom(); return; }
  const prevStarted = app.gameStarted; const prevEndTs = app.endTimestamp;
  app.players = snapshot.players || []; app.duration = snapshot.duration || 300;
  app.currentIndex = snapshot.currentIndex || 0; app.endTimestamp = snapshot.endTimestamp || null;
  app.isRunning = snapshot.isRunning || false; app.isFinished = snapshot.isFinished || false;
  app.gameStarted = snapshot.gameStarted || false;

  if (snapshot.hostTime) { timeOffset = snapshot.hostTime - Date.now(); }
  if (app.endTimestamp !== prevEndTs) resetTurnAlerts();

  const meInList = app.players.find(p => p.peerId === app.myPeerId);
  if (isInJoinPhase) {
    if (meInList) {
      isInJoinPhase = false; if (joinAckTimer) { clearTimeout(joinAckTimer); joinAckTimer = null; }
      hideStatus(); if (app.gameStarted) { ensureAudio(); requestWakeLock(); setScreen('game'); } else { setScreen('lobby'); }
      refreshUI();
    }
    return;
  }
  
  if (!meInList) { return; } 
  
  if (app.gameStarted && !prevStarted) { ensureAudio(); requestWakeLock(); setScreen('game'); }
  else if (!app.gameStarted && prevStarted) { setScreen('lobby'); }
  refreshUI();
}

function generateQRCode() {
    el.qrcode.innerHTML = '';
    const joinUrl = window.location.origin + window.location.pathname.split('?')[0] + '?code=' + app.roomCode;
    new QRCode(el.qrcode, {
        text: joinUrl,
        width: 100,
        height: 100,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.L
    });
}

function createRoom() {
  app.isHost = true; app.roomCode = generateRoomCode(); app.myName = el.nameInput.value.trim();
  showStatus('Erstelle P2P-Raum...', 'info', 0);
  
  if (peer) peer.destroy();
  const hostId = `${TOPIC_PREFIX}-${app.roomCode}`;
  app.myPeerId = `host-${generateClientId()}`;
  app.players = [{ peerId: app.myPeerId, name: app.myName, audioEnabled: true }];
  
  el.qrcodeWrapper.style.display = 'none';
  el.addLocalPlayerBox.style.display = 'none';

  generateQRCode();

  peer = new Peer(hostId, { debug: 0 });
  setConnState('connecting');
  
  peer.on('open', (id) => {
      hideStatus(); setConnState('connected');
      publishState(); startHostRepublish(); setScreen('lobby'); renderLobby();
  });
  
  peer.on('connection', (conn) => {
      hostConnections.push(conn);
      conn.on('data', (data) => {
          handleActionMessage(data); 
      });
      conn.on('close', () => {
          hostConnections = hostConnections.filter(c => c !== conn);
      });
  });
  
  peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
          showStatus('Code wird gerade verwendet. Bitte nochmal versuchen.');
          setConnState('');
      } else {
          setConnState(''); showStatus('Fehler: ' + err.type);
      }
  });
  
  peer.on('disconnected', () => { setConnState(''); if (!isExplicitLeave) peer.reconnect(); });
}

function joinRoom(code) {
  app.isHost = false; app.roomCode = code; isInJoinPhase = true;
  app.myName = el.nameInput.value.trim();
  
  el.btnToggleQR.style.display = 'none';
  el.qrcodeWrapper.style.display = 'none';
  
  showStatus('Verbinde per WebRTC...', 'info', 0);
  setConnState('connecting');
  
  initClientPeer(() => {
      establishConnectionToHost(code, false);
      joinAckTimer = setTimeout(() => { 
          if (isInJoinPhase) { showStatus('Raum nicht gefunden oder offline.'); leaveRoom(); } 
      }, 8000);
  });
}

function hostStartGame() {
  if (app.players.length < 1) return; ensureAudio(); requestWakeLock();
  app.gameStarted = true; app.currentIndex = 0; app.endTimestamp = Date.now() + app.duration * 1000;
  app.isRunning = true; app.isFinished = false; resetTurnAlerts();
  publishState(); setScreen('game'); renderGame();
}

function advanceTurn() {
  app.currentIndex = (app.currentIndex + 1) % app.players.length;
  app.endTimestamp = Date.now() + app.duration * 1000; app.isRunning = true; app.isFinished = false; resetTurnAlerts();
  publishState(); refreshUI();
}

function hostResetGame() {
  app.gameStarted = false; app.isRunning = false; app.isFinished = false; app.endTimestamp = null; app.currentIndex = 0; resetTurnAlerts();
  publishState(); setScreen('lobby'); renderLobby();
}

function hostMovePlayer(peerId, direction) {
  const idx = app.players.findIndex(p => p.peerId === peerId); if (idx < 0) return;
  const newIdx = idx + direction; if (newIdx < 0 || newIdx >= app.players.length) return;
  [app.players[idx], app.players[newIdx]] = [app.players[newIdx], app.players[idx]];
  publishState(); renderLobby();
}

function hostKickPlayer(peerId) { if (peerId !== app.myPeerId) removePlayer(peerId); }

function hostAddLocalPlayer() {
  const name = el.localPlayerInput.value.trim();
  if (!name) { showStatus('Bitte einen Namen eingeben.'); el.localPlayerInput.focus(); return; }
  if (app.gameStarted) return;
  const localId = 'local-' + generateClientId();
  app.players.push({ peerId: localId, name: name, isLocal: true });
  el.localPlayerInput.value = '';
  el.addLocalPlayerBox.style.display = 'none';
  publishState(); renderLobby();
}

function leaveRoom() {
  isExplicitLeave = true;
  releaseWakeLock(); stopHostRepublish(); stopWatchdog(); if (joinAckTimer) { clearTimeout(joinAckTimer); joinAckTimer = null; }
  isInJoinPhase = false;
  
  if (app.isHost) {
      const snapshot = { closed: true };
      hostConnections.forEach(c => { if(c.open) c.send({ type: 'state', state: snapshot }); c.close(); });
  } else {
      if (clientConnToHost && clientConnToHost.open) { 
          clientConnToHost.send({ type: 'leave', from: app.myPeerId, ts: Date.now() }); 
          clientConnToHost.close(); 
      }
  }
  
  if (peer) { peer.destroy(); peer = null; }
  hostConnections = []; clientConnToHost = null;
  Object.assign(app, { isHost: false, myPeerId: null, roomCode: null, players: [], currentIndex: 0, endTimestamp: null, isRunning: false, isFinished: false, gameStarted: false });
  setConnState(''); setScreen('welcome');
  
  window.history.replaceState({}, document.title, window.location.pathname);
  el.codeInput.value = '';
}

function promptLeaveRoom() {
    if (app.isHost) {
        if (confirm("Möchtest du den Raum wirklich beenden?\n\nDadurch wird das Spiel abgebrochen und der Raum für alle Mitspieler geschlossen.")) {
            leaveRoom();
        }
    } else {
        if (confirm("Möchtest du den Raum wirklich verlassen?")) {
            leaveRoom();
        }
    }
}

function tick() {
  if (app.gameStarted && app.endTimestamp) {
    const hostNow = app.isHost ? Date.now() : (Date.now() + timeOffset);
    const remaining = app.endTimestamp - hostNow;
    el.gameTimeText.textContent = formatTime(remaining);
    const totalMs = app.duration * 1000;
    const progress = Math.max(0, Math.min(1, remaining / totalMs));
    el.progressRingFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

    if (!halftimeTriggered && totalMs > 120000 && remaining > 0 && remaining <= totalMs / 2) {
      halftimeTriggered = true; if(audioAllowed()) alertHalftime();
    }
    if (!thirtySecTriggered && totalMs > 30000 && remaining > 0 && remaining <= 30000) {
      thirtySecTriggered = true; if(audioAllowed()) alertThirtySeconds();
    }
    if (totalMs > 10000 && remaining > 0) {
      const secondsLeft = Math.ceil(remaining / 1000);
      if (secondsLeft <= 10 && secondsLeft !== lastCountdownSecond) {
        lastCountdownSecond = secondsLeft; if(audioAllowed()) alertCountdownTick(secondsLeft);
      }
    }

    if (remaining <= 0) {
      el.gameTimeText.classList.add('finished');
      if (!alarmTriggered) { 
        alarmTriggered = true; 
        if(audioAllowed()) { alertFinished(); vibrate(); }
        if (app.isHost && app.isRunning) { app.isRunning = false; app.isFinished = true; publishState(); } 
      }
    } else { el.gameTimeText.classList.remove('finished'); }
  }
  requestAnimationFrame(tick);
}

function refreshUI() {
  if (document.getElementById('screen-lobby').classList.contains('active')) renderLobby();
  else if (document.getElementById('screen-game').classList.contains('active')) renderGame();
}

function renderLobby() {
  el.lobbyRoomCode.textContent = app.roomCode || '----'; el.playerList.innerHTML = '';
  app.players.forEach((p, idx) => {
    const row = document.createElement('div'); row.className = 'player-row' + (p.peerId === app.myPeerId ? ' me' : '');
    
    const num = document.createElement('div'); num.className = 'num'; num.textContent = idx + 1; row.appendChild(num);
    const name = document.createElement('div'); name.className = 'name'; name.style.flex = '1'; name.style.fontSize = '16px'; name.style.overflow = 'hidden'; name.style.textOverflow = 'ellipsis'; name.style.whiteSpace = 'nowrap'; name.textContent = p.name;
    
    if (p.peerId === app.myPeerId) { const tag = document.createElement('span'); tag.className = 'me-tag'; tag.style.color = '#a78bfa'; tag.style.fontSize = '10px'; tag.style.marginLeft = '6px'; tag.textContent = '(du)'; name.appendChild(tag); }
    if (p.isLocal) { const tag = document.createElement('span'); tag.style.color = 'rgba(255,255,255,0.4)'; tag.style.fontSize = '10px'; tag.style.marginLeft = '6px'; tag.textContent = '(kein Handy)'; name.appendChild(tag); }
    row.appendChild(name);

    if (app.isHost) {
      if (!p.isLocal) {
        const audioBtn = document.createElement('button');
        audioBtn.className = 'audio-toggle';
        audioBtn.innerHTML = p.audioEnabled ? '🔊' : '🔇';
        audioBtn.title = 'Ansage umschalten';
        audioBtn.onclick = () => {
          p.audioEnabled = !p.audioEnabled;
          publishState();
          renderLobby();
        };
        row.appendChild(audioBtn);
      }

      const ctrls = document.createElement('div'); ctrls.className = 'reorder-btns';
      const up = document.createElement('button'); up.type = 'button'; up.innerHTML = '&uarr;'; up.disabled = idx === 0; up.onclick = () => hostMovePlayer(p.peerId, -1);
      const down = document.createElement('button'); down.type = 'button'; down.innerHTML = '&darr;'; down.disabled = idx === app.players.length - 1; down.onclick = () => hostMovePlayer(p.peerId, 1);
      ctrls.appendChild(up); ctrls.appendChild(down);
      if (p.peerId !== app.myPeerId) { const kick = document.createElement('button'); kick.type = 'button'; kick.className = 'kick'; kick.innerHTML = '&times;'; kick.onclick = () => hostKickPlayer(p.peerId); ctrls.appendChild(kick); }
      row.appendChild(ctrls);
    }
    el.playerList.appendChild(row);
  });
  
  el.hostControls.style.display = app.isHost ? 'block' : 'none'; 
  el.joinerWait.style.display = app.isHost ? 'none' : 'block';
  el.btnToggleQR.style.display = app.isHost ? 'flex' : 'none';
  el.btnToggleAddLocal.style.display = app.isHost ? 'block' : 'none';
  
  if (app.isHost) { 
      el.lobbyDurationSlider.value = app.duration; el.lobbySliderValue.textContent = formatDurationLabel(app.duration);
      if (app.gameStarted) {
          el.btnStartGame.textContent = 'Zurück zum Spiel';
          el.btnStartGame.disabled = false;
      } else {
          el.btnStartGame.textContent = 'Spiel starten';
          el.btnStartGame.disabled = app.players.length < 1; 
      }
  } else { 
      el.joinerWaitText.textContent = `Warte auf Spielstart… (${formatDurationLabel(app.duration)} pro Zug)`; 
  }
}

function renderGame() {
  const cur = app.players[app.currentIndex]; el.currentPlayerName.textContent = cur ? cur.name : '-'; el.gamePlayerPills.innerHTML = '';
  app.players.forEach((p, idx) => {
    const pill = document.createElement('div'); pill.className = 'player-pill' + (idx === app.currentIndex ? ' current' : ''); pill.textContent = p.name + (p.isLocal ? ' · kein Handy' : ''); el.gamePlayerPills.appendChild(pill);
  });
  const isMyTurn = cur && cur.peerId === app.myPeerId; el.btnNext.style.display = isMyTurn ? 'block' : 'none'; el.waitingBanner.style.display = isMyTurn ? 'none' : 'flex';
  if (!isMyTurn && cur) { el.waitingForName.textContent = cur.name; }
  
  if (app.isHost) {
    el.btnHostNext.style.display = isMyTurn ? 'none' : 'block';
    if (app.players.length > 0) {
        const nextIdx = (app.currentIndex + 1) % app.players.length;
        el.btnHostNext.textContent = `Nächster: ${app.players[nextIdx].name}`;
    }
    document.getElementById('hostGameButtons').style.display = 'flex';
    document.getElementById('btnHostEndGame').style.display = 'block';
    document.getElementById('btnHostToLobby').style.display = 'block';
    document.getElementById('clientGameButtons').style.display = 'none';
  } else {
    el.btnHostNext.style.display = 'none';
    document.getElementById('hostGameButtons').style.display = 'none';
    document.getElementById('clientGameButtons').style.display = 'flex';
    el.btnLeaveGame.style.display = isMyTurn ? 'none' : 'block';
  }
}

el.nameInput.value = getSavedName();
function attachClick(elem, handler) {
  let handled = false;
  elem.addEventListener('touchend', (e) => { if (elem.disabled) return; e.preventDefault(); if (handled) return; handled = true; setTimeout(() => { handled = false; }, 500); handler(e); }, { passive: false });
  elem.addEventListener('click', (e) => { if (elem.disabled) return; if (handled) return; handled = true; setTimeout(() => { handled = false; }, 500); handler(e); });
}

function promptTimeInput() {
    if (!app.isHost) return;
    const currentMin = app.duration / 60;
    const input = prompt("Zeit in Minuten eingeben (z.B. 5 oder 1.5):", currentMin.toString());
    if (input !== null) {
        let parsed = parseFloat(input.replace(',', '.'));
        if (!isNaN(parsed) && parsed > 0) {
            let totalSeconds = Math.round(parsed * 60);
            totalSeconds = Math.max(10, Math.min(totalSeconds, 3600)); // Max 1 Stunde
            app.duration = totalSeconds;
            el.lobbyDurationSlider.value = totalSeconds;
            el.lobbySliderValue.textContent = formatDurationLabel(totalSeconds);
            clearTimeout(durationBroadcastTimer); 
            durationBroadcastTimer = setTimeout(() => publishState(), 200);
        }
    }
}

el.lobbySliderValue.addEventListener('dblclick', (e) => {
    e.preventDefault();
    promptTimeInput();
});

el.lobbySliderValue.addEventListener('touchend', (e) => {
    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastSliderTap;
    if (tapLength < 400 && tapLength > 0) {
        e.preventDefault();
        promptTimeInput();
    }
    lastSliderTap = currentTime;
});

attachClick(el.btnCreate, () => { const name = el.nameInput.value.trim(); if (!name) { showStatus('Bitte gib einen Namen ein.'); el.nameInput.focus(); return; } saveName(name); ensureAudio(); createRoom(); });
attachClick(el.btnJoin, () => { const name = el.nameInput.value.trim(); const code = el.codeInput.value.trim().toUpperCase(); if (!name) { showStatus('Bitte gib einen Namen ein.'); el.nameInput.focus(); return; } if (code.length !== 4) { showStatus('Bitte 4-stelligen Code eingeben.'); el.codeInput.focus(); return; } saveName(name); ensureAudio(); joinRoom(code); });

el.codeInput.addEventListener('input', (e) => { e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4); });
el.lobbyDurationSlider.addEventListener('input', (e) => { const s = parseInt(e.target.value); app.duration = s; el.lobbySliderValue.textContent = formatDurationLabel(s); clearTimeout(durationBroadcastTimer); durationBroadcastTimer = setTimeout(() => publishState(), 200); });

attachClick(el.btnToggleQR, () => {
    const isHidden = el.qrcodeWrapper.style.display === 'none';
    el.qrcodeWrapper.style.display = isHidden ? 'flex' : 'none';
});

attachClick(el.btnToggleAddLocal, () => {
    const isHidden = el.addLocalPlayerBox.style.display === 'none';
    el.addLocalPlayerBox.style.display = isHidden ? 'block' : 'none';
    if (isHidden) el.localPlayerInput.focus();
});

attachClick(el.btnStartGame, () => { 
    ensureAudio(); 
    if (app.gameStarted) {
        setScreen('game');
        renderGame();
    } else {
        hostStartGame(); 
    }
});

attachClick(el.btnLeaveLobbyTop, () => { promptLeaveRoom(); });
attachClick(el.btnAddLocalPlayer, () => { hostAddLocalPlayer(); });
el.localPlayerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); hostAddLocalPlayer(); } });
attachClick(el.btnNext, () => { if (!app.gameStarted) return; const cur = app.players[app.currentIndex]; if (!cur || cur.peerId !== app.myPeerId) return; vibrate([50]); if (app.isHost) { advanceTurn(); } else { publishAction({ type: 'next' }); } });
attachClick(el.btnHostNext, () => { if (app.isHost && app.gameStarted) { vibrate([50]); advanceTurn(); } });

attachClick(el.btnHostEndGame, () => { if (app.isHost) hostResetGame(); });
attachClick(el.btnHostToLobby, () => { 
    if (app.isHost) { 
        setScreen('lobby'); 
        renderLobby(); 
    } 
});

attachClick(el.btnLeaveGame, () => { promptLeaveRoom(); });

window.addEventListener('beforeunload', () => {
  if (app.roomCode) {
      if (app.isHost) {
          const snapshot = { closed: true };
          hostConnections.forEach(c => { if(c.open) c.send({ type: 'state', state: snapshot }); });
      } else {
          if (clientConnToHost && clientConnToHost.open) {
              clientConnToHost.send({ type: 'leave', from: app.myPeerId, ts: Date.now() });
          }
      }
  }
});

requestAnimationFrame(tick);
</script>
</body>
</html>
